# nginx/nginx.conf — Reverse proxy + static frontend serving
# Pour ColoriMagiques (Docker Compose)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    # Upstream backend
    upstream backend {
        server backend:4000;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Frontend static files
        root /usr/share/nginx/html;
        index index.html;

        # Cache static assets (CSS, JS, images)
        location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API proxy → Node.js backend
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Taille max upload (PDF 50 Mo)
            client_max_body_size 55m;
        }

        # SPA fallback — toutes les routes non-fichiers renvoient index.html
        location / {
            limit_req zone=general burst=20 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # HTTPS server (décommenter quand SSL configuré)
    # server {
    #     listen 443 ssl http2;
    #     server_name colorimagiques.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # Même config que le server HTTP ci-dessus
    #     root /usr/share/nginx/html;
    #     index index.html;
    #
    #     location /api/ { ... }
    #     location / { try_files $uri $uri/ /index.html; }
    # }
    #
    # # Redirect HTTP → HTTPS
    # server {
    #     listen 80;
    #     server_name colorimagiques.com;
    #     return 301 https://$host$request_uri;
    # }
}
