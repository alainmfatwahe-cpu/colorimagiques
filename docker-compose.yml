version: '3.8'

services:
  # ─── MySQL Database ───
  db:
    image: mysql:8.0
    container_name: colorimagiques-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_change_me
      MYSQL_DATABASE: colorimagiques
      MYSQL_USER: colorimagiques
      MYSQL_PASSWORD: colorimagiques_secret
    ports:
      - ${DB_PORT:-3306}:3306
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [CMD, mysqladmin, ping, -h, localhost, -u, root, -p${MYSQL_ROOT_PASSWORD}]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Node.js/Express ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: colorimagiques-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_CLIENT: mysql2
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: colorimagiques
      DB_PASSWORD: colorimagiques_secret
      DB_NAME: colorimagiques
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_64chars_minimum}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxxx}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_xxxx}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-ColoriMagiques <noreply@colorimagiques.com>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@colorimagiques.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      SIGNED_URL_SECRET: ${SIGNED_URL_SECRET:-change_me_signed_url_secret}
    ports:
      - ${BACKEND_PORT:-4000}:4000
    volumes:
      - uploads_data:/app/uploads

  # ─── Frontend Build + Serve (Nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: colorimagiques-frontend
    restart: unless-stopped
    ports:
      - ${FRONTEND_PORT:-80}:80

  # ─── Nginx Reverse Proxy (optionnel, si tu veux tout derrière un seul port) ───
  nginx-proxy:
    image: nginx:alpine
    container_name: colorimagiques-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - ${NGINX_PORT:-8080}:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - FRONTEND_URL=http://frontend:80
      - BACKEND_URL=http://backend:4000

volumes:
  mysql_data:
  uploads_data: